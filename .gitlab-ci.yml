stages:
  - test
  - deploy

test:
  stage: test
  image: iai-artifactory.iai.kit.edu/docker-webis/ci-build/python:latest
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /make test/
  script:
    - python3 -m pip install -q .
    - python3 -m unittest discover -q -s tests -p 'test_*.py'

deploy:
  stage: deploy
  image: iai-artifactory.iai.kit.edu/docker-webis/ci-build/python:latest
  rules:
    - if: $CI_COMMIT_TAG != null
  script:
    - /usr/local/scripts/config-deploy-auth $IAI_ARTIFACTORY_USER $IAI_ARTIFACTORY_ENC_PASS
    - python3 -m pip install -q .
    - python3 -m build
    - python3 -m twine upload -r iai-artifactory dist/*